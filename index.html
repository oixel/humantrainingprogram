<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Human Training Program</title>
    <link rel="stylesheet" href="index.css">
    <link rel="icon" type="image/x-icon" href="/assets/icons/htp.svg">
</head>

<body>
    <div class="background-layer parallax" parallax="0.5"></div>
    <div class="popup">
        <div class="popup-exit-bar">
            <img src="assets/icons/htp.svg" class="popup-icon"></img>
            <p class="popup-app-name">Human Training Program</p>
            <button class="popup-exit-button">
                <p>X</p>
            </button>
        </div>
        <div class="popup-content">
            <div class="animal-icons">
                <a href="https://www.instagram.com/sitaaronsepari/" class="animal-icon">
                    <img class="normal" src="assets/icons/monkey-normal.png" />
                    <img class="hover" src="assets/icons/monkey-hover.png" />
                </a>
                <a href="https://www.instagram.com/hue.manateee/" class="animal-icon">
                    <img class="normal" src="assets/icons/cat-normal.png" />
                    <img class="hover" src="assets/icons/cat-hover.png" />
                </a>
                <a href="https://www.instagram.com/graphically.simeon/" class="animal-icon">
                    <img class="normal" src="assets/icons/frog-normal.png" />
                    <img class="hover" src="assets/icons/frog-hover.png" />
                </a>
            </div>
            <a href="https://www.instagram.com/humantrainingprogram/" class="url">@humantrainingprogram</a>
        </div>

    </div>
    <div class="htp-exe hidden">
        <img src="assets/icons/htp.svg" class="htp-exe-icon" alt="HTP Logo" />

        <p>htp.exe</p>
    </div>
</body>

<script src="index.js"></script>

</html>
